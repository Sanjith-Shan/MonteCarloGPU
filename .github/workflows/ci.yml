name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python tests (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt

      - name: Run test suite
        # GitHub runners have no GPU, so PyTorch falls back to CPU. The pricers
        # and the Black Scholes validation still run and must pass.
        run: python -m pytest -q

      - name: Smoke test the benchmark
        run: python python/benchmark.py --quick --no-cpu

  cpp-build:
    name: C++ engine builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The CUDA toolkit is not installed on the default runner, so this job
      # only checks that the host C++ (Black Scholes, CLI parsing) compiles. The
      # CUDA kernels are built and tested inside the GPU container.
      - name: Compile host side Black Scholes check
        run: |
          g++ -std=c++17 -Iinclude -c src/black_scholes.cpp -o /tmp/bs.o
          echo "Host C++ compiled cleanly"
